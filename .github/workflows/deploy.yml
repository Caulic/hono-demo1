name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.32.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: |
            apps/server/dist/
            template.yaml
            samconfig.toml

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/build/client/

  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: server-dist

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM deploy
        run: |
          sam deploy \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DatabaseUrl=${{ secrets.DATABASE_URL }} \
              CorsOrigin=${{ secrets.CORS_ORIGIN }} \
              VpcSubnetIds="${{ secrets.VPC_SUBNET_IDS }}" \
              VpcSecurityGroupIds="${{ secrets.VPC_SECURITY_GROUP_IDS }}"

  deploy-web:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-dist/ --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
